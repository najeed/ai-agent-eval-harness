name: 🐛 Bug Report
description: Report a bug to help us improve.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How can we reproduce it?
      description: Provide a minimal scenario or CLI command.
      placeholder: "python -m eval_runner run --scenario industries/telecom/scenario_1.json"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Please copy and paste any relevant log output.
      render: shell
