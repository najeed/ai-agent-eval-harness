name: Agent Reliability Gate

on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ main, dev ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  evaluate-agents:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Eval Harness
        run: |
          pip install -e .
          pip install -r requirements.txt

      - name: Validate AES Scenarios
        run: |
          agentv aes validate --path industries/telecom/scenarios/

      - name: Run Industry Evaluation (Telecom)
        run: |
          agentv evaluate --path industries/telecom/scenarios --format jsonl --output reports/eval_results.json
        env:
          OTEL_SDK_DISABLED: true
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || '' }}

      - name: Run Global Scenario Evaluation
        run: |
          agentv evaluate --path scenarios/ --attempts 3

      - name: Upload Replay Traces
        uses: actions/upload-artifact@v5
        with:
          name: agent-run-traces
          path: reports/trajectories/*.jsonl

      - name: Regression Check
        run: |
          # [Future] eval-harness compare ./reports ./baselines --threshold 0.05
          echo "Regression check passed (baseline comparison simulated)"
