name: docs
on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Checkout Persistence Branch (gh-pages)
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: final-site
        continue-on-error: true

      - name: Initialize Persistence Path
        run: mkdir -p final-site

      # --- 1. Legacy Docs Build (MkDocs) ---
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: pip install mkdocs-material
      - name: Build Legacy Metrics (MkDocs)
        run: mkdocs build

      # --- 2. Primary Docs Build (Starlight) ---
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install Starlight Dependencies
        run: |
          cd docs
          npm install

      - name: Build Primary Starlight Docs (Main)
        if: github.ref == 'refs/heads/main'
        run: |
          cd docs
          npm run build -- --base /ai-agent-eval-harness/

      - name: Build Primary Starlight Docs (Dev)
        if: github.ref == 'refs/heads/dev'
        run: |
          cd docs
          npm run build -- --base /ai-agent-eval-harness/dev/

      # --- 3. Assembly Logic (Merge into Persistence Path) ---
      - name: Assemble Site (Main)
        if: github.ref == 'refs/heads/main'
        run: |
          # Starlight to Root
          cp -rv docs/dist/* final-site/
          # MkDocs to /old
          mkdir -p final-site/old
          cp -rv site/* final-site/old/

      - name: Assemble Site (Dev)
        if: github.ref == 'refs/heads/dev'
        run: |
          # Starlight to /dev
          mkdir -p final-site/dev
          cp -rv docs/dist/* final-site/dev/
          # MkDocs to /old-dev
          mkdir -p final-site/old-dev
          cp -rv site/* final-site/old-dev/

      # --- 4. Deployment & Persistence ---
      - name: Sync Persistence Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final-site
          publish_branch: gh-pages
          keep_files: false # final-site already contains the merged state

      #- name: Upload Pages Artifact
      #  uses: actions/upload-pages-artifact@v3
      #  with:
      #    path: ./final-site

      #- name: Deploy to GitHub Pages
      #  id: deployment
      #  uses: actions/deploy-pages@v4