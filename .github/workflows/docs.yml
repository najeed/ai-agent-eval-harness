name: docs
on:
  push:
    branches:
      - main
      - dev

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # --- 1. Legacy Docs Build (MkDocs) ---
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc +%V)" >> $GITHUB_ENV
      - uses: actions/cache@v5
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material
      - name: Build Legacy Metrics (MkDocs)
        run: mkdocs build

      # --- 2. Primary Docs Build (Starlight) ---
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install Starlight Dependencies
        run: |
          cd docs
          npm install

      - name: Build Primary Starlight Docs (Main)
        if: github.ref == 'refs/heads/main'
        run: |
          cd docs
          npm run build -- --base /ai-agent-eval-harness/

      - name: Build Primary Starlight Docs (Dev)
        if: github.ref == 'refs/heads/dev'
        run: |
          cd docs
          npm run build -- --base /ai-agent-eval-harness/dev/

      # --- 3. Deployment Logic ---

      # A. Primary Starlight to root (.) [Main Only]
      - name: Deploy Primary Docs (Starlight -> Root)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/dist
          destination_dir: .
          keep_files: true

      # B. Primary Starlight to /dev [Dev Only]
      - name: Deploy Primary Docs (Starlight -> /dev)
        if: github.ref == 'refs/heads/dev'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/dist
          destination_dir: dev
          keep_files: true

      # C. Legacy (Main) to /old [Main Only]
      - name: Deploy Legacy Docs (Main -> /old)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          destination_dir: old
          keep_files: true

      # D. Legacy (Dev) to /old-dev [Dev Only]
      - name: Deploy Legacy Docs (Dev -> /old-dev)
        if: github.ref == 'refs/heads/dev'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          destination_dir: old-dev
          keep_files: true