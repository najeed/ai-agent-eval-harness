name: Security Scan

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  STRICT_PLUGINS: true

jobs:
  python-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt
          pip install pip-audit bandit safety

      - name: Run pip-audit
        # CVE-2026-3219, CVE-2026-6357, PYSEC-2026-196 (pip), PYSEC-2026-139, and CVE-2025-3000 are unpatchable or have no fix versions listed yet.
        # --skip-editable prevents auditing the local 'agentv' package which is not on PyPI.
        run: pip-audit --desc on --ignore-vuln CVE-2026-3219 --ignore-vuln CVE-2026-6357 --ignore-vuln PYSEC-2026-196 --ignore-vuln PYSEC-2026-139 --ignore-vuln CVE-2025-3000 --skip-editable

      - name: Run Bandit
        run: bandit -r . -ll

      - name: Run Safety
        run: safety scan

  container-security:
    needs: python-security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Build Docker image
        run: docker build -t agentv:latest .

      - name: Scan Docker image with Trivy
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL agentv:latest
