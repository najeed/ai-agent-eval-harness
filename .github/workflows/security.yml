name: Security Scan

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  STRICT_PLUGINS: true

jobs:
  python-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install -r requirements.txt
          pip install pip-audit bandit safety

      - name: Run pip-audit
        # CVE-2026-3219 (pip) is currently unpatchable (no upstream fix as of 2026-04-25).
        # We ignore it here to prevent blocking CI, as our environment uses trusted sources.
        run: pip-audit --desc on --ignore-vuln CVE-2026-3219

      - name: Run Bandit
        run: bandit -r . -ll

      - name: Run Safety
        run: safety check

  container-security:
    needs: python-security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Build Docker image
        run: docker build -t agentv:latest .

      - name: Scan Docker image with Trivy
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL agentv:latest
