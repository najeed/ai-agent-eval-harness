name: Smoke Test CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
      - name: Run Unit Tests
        run: |
          python -m pytest tests/unit/handlers/test_catalog.py tests/unit/core/test_linter_compliance.py tests/unit/adapters/test_adapters_discovery.py
      - name: Run Deterministic Smoke Test
        run: |
          agentv quickstart
        # quickstart uses a mock agent and deterministic scenario
