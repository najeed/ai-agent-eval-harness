name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  STRICT_PLUGINS: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']
    
    permissions:
      contents: read

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        token: ${{ github.token }}
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint & Format with Ruff
      run: |
        ruff check .
        ruff format --check .

    - name: Install Playwright Browsers
      run: python -m playwright install --with-deps chromium

    - name: Test with pytest
      run: pytest tests/ --cov=eval_runner -v -p no:plugin_gateway
      env:
        OTEL_SDK_DISABLED: true

    - name: Security audit tests
      run: pytest tests/security/test_security_audit.py -v
      env:
        OTEL_SDK_DISABLED: true

    - name: Console handoff tests
      run: pytest tests/unit/handlers/test_console_handoff.py -v
      env:
        OTEL_SDK_DISABLED: true

  ui-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        # Install playwright browsers
        python -m playwright install chromium
    - name: Run Playwright UI tests
      run: pytest tests/ui/ -v -s
      env:
        TRAJECTORY_DIR: tests/data/mock_trajectories
