<svg width="260" height="48" viewBox="0 0 260 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="primary_gradient" x1="0" y1="0" x2="260" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="inner_glow" x1="0" y1="0" x2="0" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.1"/>
      <stop offset="1" stop-color="white" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background with Glassmorphism / Dark Theme -->
  <rect width="260" height="48" rx="12" fill="#0F172A"/>
  <rect x="0.5" y="0.5" width="259" height="47" rx="11.5" stroke="#1E293B"/>
  <rect width="260" height="48" rx="12" fill="url(#inner_glow)"/>

  <!-- Icon / Checkmark -->
  <g filter="url(#glow)">
    <circle cx="24" cy="24" r="8" fill="url(#primary_gradient)" fill-opacity="0.2"/>
    <path d="M18 24.5L22 28.5L29 20" stroke="url(#primary_gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Typography -->
  <text x="48" y="29" fill="#F8FAFC" style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 15px; font-weight: 700; letter-spacing: -0.01em;">
    Works with <tspan fill="url(#primary_gradient)">MultiAgentEval</tspan>
  </text>
  
  <!-- Subtle Border Highlight -->
  <rect x="1" y="1" width="258" height="1" rx="0.5" fill="white" fill-opacity="0.08"/>
</svg>
