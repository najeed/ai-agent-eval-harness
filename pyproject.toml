[project]
name = "eval_runner"
version = "0.1.0"
dependencies = [
    "aiohttp>=3.8.0",
    "Flask>=2.0.0",
    "requests>=2.0.0",
    "jsonschema>=4.0.0",
    "PyYAML>=6.0",
    "sentence-transformers",
    "numpy",
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["eval_runner"]

[project.scripts]
eval-harness = "eval_runner.cli:main"

[project.entry-points."eval_runner.plugins"]
coverage = "eval_runner.coverage_plugin:CoveragePlugin"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
python_files = ["test_*.py"]